name: Bug report
description: Report a defect — something that should work doesn't
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill out the sections below so we can reproduce it.

        For **security issues**, please use [private vulnerability reporting](https://github.com/ievsantillan/edm-fabric-usergroup_raffle-spinner/security/advisories/new) instead.

  - type: input
    id: deployment
    attributes:
      label: Where did it happen?
      description: The URL of the deployed site, or "local dev (npm run dev)".
      placeholder: https://ievsantillan.github.io/edm-fabric-usergroup_raffle-spinner/
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Be as specific as possible — copy-pasteable steps are gold.
      placeholder: |
        1. Upload `test-participants.csv`
        2. Pick the `Name` column
        3. Hit SPIN
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include any error messages from the browser console (F12 → Console).
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 142 on Windows 11, Safari 26 on macOS 26"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, the raffle file you uploaded (anonymised), localStorage state, etc.
