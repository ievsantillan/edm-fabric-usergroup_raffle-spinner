name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the problem first, then your proposed solution. This helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What's painful today? Who is affected?
      placeholder: "When running a raffle with 200+ attendees, the slot machine animation is …"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one is better.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - "UI / UX"
        - "Raffle logic (picking, prizes, undo, etc.)"
        - "File upload / parsing"
        - "Export / reporting"
        - "Accessibility"
        - "Performance"
        - "Template / forkability"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Sketches, links to similar features in other tools, etc.
